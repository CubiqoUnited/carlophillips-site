name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - qa

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint if configured
        shell: bash
        run: |
          if npm run | grep -qE '^  lint$'; then
            npm run lint
          else
            echo "No lint script configured; skipping."
          fi

      - name: Typecheck if configured
        shell: bash
        run: |
          if npm run | grep -qE '^  typecheck$'; then
            npm run typecheck
          else
            echo "No typecheck script configured; skipping."
          fi

      - name: Test if configured
        shell: bash
        run: |
          if npm run | grep -qE '^  test$'; then
            npm test
          else
            echo "No test script configured; skipping."
          fi

      - name: Build
        run: npm run build
